<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal HTML Pages</title>
  <style>
    :root {
      --bg: #f5efe6;
      --surface: rgba(255, 252, 247, 0.92);
      --surface-strong: #fffdf9;
      --line: #d9cbb8;
      --text: #2d241a;
      --muted: #786756;
      --accent: #1d6b5c;
      --accent-strong: #12473d;
      --accent-soft: #dff1eb;
      --danger: #b23a2b;
      --shadow: 0 24px 60px rgba(74, 47, 22, 0.14);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(29, 107, 92, 0.16), transparent 32%),
        radial-gradient(circle at top right, rgba(215, 145, 73, 0.18), transparent 28%),
        linear-gradient(180deg, #fbf6ee 0%, #f2e6d8 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .hero,
    .panel,
    .page-card,
    .empty-state {
      background: var(--surface);
      border: 1px solid rgba(217, 203, 184, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(29, 107, 92, 0.2), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(34px, 10vw, 56px);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 0;
      max-width: 640px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .layout {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      padding: 20px;
    }

    .panel h2,
    .pages-header h2 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .panel p,
    .pages-header p,
    .empty-state p,
    .page-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .auth-row {
      display: grid;
      gap: 10px;
    }

    .auth-form label {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-strong);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .auth-form input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
    }

    .auth-form button,
    .page-card .open-link,
    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      border: 0;
      border-radius: 16px;
      padding: 0 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .auth-form button,
    .page-card .open-link {
      background: linear-gradient(135deg, var(--accent) 0%, #2f8f7c 100%);
      color: #fff;
      box-shadow: 0 16px 30px rgba(29, 107, 92, 0.24);
    }

    .secondary-button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .auth-form button:hover,
    .page-card .open-link:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
    }

    .helper {
      font-size: 14px;
      color: var(--muted);
    }

    .error {
      min-height: 20px;
      font-size: 14px;
      font-weight: 700;
      color: var(--danger);
    }

    .note {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 244, 230, 0.95);
      border: 1px solid #efd2b3;
      font-size: 14px;
      color: #7f5b32;
    }

    .pages-section {
      display: none;
      gap: 16px;
    }

    .pages-section.is-visible {
      display: grid;
    }

    .pages-header {
      padding: 6px 2px 0;
    }

    .pages-grid {
      display: grid;
      gap: 14px;
    }

    .page-card,
    .empty-state {
      padding: 18px;
    }

    .page-card {
      display: grid;
      gap: 14px;
    }

    .page-card h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--accent-strong);
    }

    .meta span {
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      font-weight: 700;
    }

    .page-card .open-link {
      width: 100%;
    }

    .empty-state {
      text-align: center;
      padding: 28px 20px;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .empty-emoji {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .status {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (min-width: 720px) {
      .shell {
        padding-top: 32px;
      }

      .hero {
        padding: 34px;
      }

      .layout {
        grid-template-columns: 360px minmax(0, 1fr);
        align-items: start;
      }

      .pages-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <!-- This password gate is only light obfuscation, not real authentication. Do not place truly sensitive information here. -->
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">Personal Archive</div>
      <h1>Personal HTML Pages</h1>
      <p>GitHub Pages で公開する個人用の HTML 一覧です。スマホから見やすい形でページをまとめています。</p>
    </section>

    <div class="layout">
      <section class="panel" id="auth-panel">
        <h2>簡易パスワード</h2>
        <p>一覧を見るには簡易パスワードを入力してください。認証ではなく、軽い目隠しです。</p>
        <form class="auth-form" id="auth-form">
          <div class="auth-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="パスワードを入力">
          </div>
          <button type="submit">一覧を開く</button>
          <div class="error" id="auth-error" aria-live="polite"></div>
        </form>
        <p class="helper">認証状態はこのブラウザの `localStorage` に保存されます。</p>
        <div class="note">パスワードは簡易ロックです。本当に秘密の情報は置かないでください。</div>
      </section>

      <section class="pages-section" id="pages-section">
        <div class="pages-header">
          <h2>ページ一覧</h2>
          <p>`pages.json` を読み込んで公開ページを一覧表示します。</p>
        </div>
        <div class="status" id="pages-status" aria-live="polite"></div>
        <div class="pages-grid" id="pages-grid"></div>
        <button class="secondary-button" id="logout-button" type="button">このブラウザの認証を解除</button>
      </section>
    </div>
  </div>

  <script>
    const PASSWORD = "uotsu-pages";
    const AUTH_KEY = "personal-html-pages-authenticated";

    const authPanel = document.getElementById("auth-panel");
    const authForm = document.getElementById("auth-form");
    const passwordInput = document.getElementById("password");
    const authError = document.getElementById("auth-error");
    const pagesSection = document.getElementById("pages-section");
    const pagesGrid = document.getElementById("pages-grid");
    const pagesStatus = document.getElementById("pages-status");
    const logoutButton = document.getElementById("logout-button");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setAuthenticatedState(isAuthenticated) {
      authPanel.style.display = isAuthenticated ? "none" : "block";
      pagesSection.classList.toggle("is-visible", isAuthenticated);

      if (!isAuthenticated) {
        pagesGrid.innerHTML = "";
        pagesStatus.textContent = "";
        authError.textContent = "";
        passwordInput.value = "";
      }
    }

    function renderEmptyState() {
      pagesGrid.innerHTML = `
        <article class="empty-state">
          <div class="empty-emoji">🗂️</div>
          <strong>まだページがありません</strong>
          <p>ルートに HTML を置いて `publish-html-page` Skill で公開用のページに変換すると、ここに表示されます。</p>
        </article>
      `;
    }

    function renderPages(pages) {
      if (!Array.isArray(pages) || pages.length === 0) {
        renderEmptyState();
        return;
      }

      const sortedPages = [...pages].sort((a, b) => {
        const left = typeof a.createdAt === "string" ? a.createdAt : "";
        const right = typeof b.createdAt === "string" ? b.createdAt : "";
        return right.localeCompare(left);
      });

      pagesGrid.innerHTML = sortedPages.map((page) => {
        const title = page && page.title ? page.title : "Untitled";
        const description = page && page.description ? page.description : "説明はまだありません。";
        const path = page && page.path ? page.path : "./";
        const createdAt = page && page.createdAt ? page.createdAt : "unknown";

        return `
          <article class="page-card">
            <div class="meta">
              <span>${escapeHtml(createdAt)}</span>
            </div>
            <div>
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(description)}</p>
            </div>
            <a class="open-link" href="${escapeHtml(path)}">ページを開く</a>
          </article>
        `;
      }).join("");
    }

    async function loadPages() {
      pagesStatus.textContent = "ページを読み込み中...";

      try {
        const response = await fetch("./pages.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const pages = await response.json();
        renderPages(pages);
        pagesStatus.textContent = `${Array.isArray(pages) ? pages.length : 0}件のページを表示できます`;
      } catch (error) {
        pagesGrid.innerHTML = `
          <article class="empty-state">
            <div class="empty-emoji">⚠️</div>
            <strong>ページを読み込めませんでした</strong>
            <p>\`pages.json\` を読み込めませんでした。JSON の形式と公開状態を確認してください。</p>
          </article>
        `;
        pagesStatus.textContent = "ページを読み込めませんでした。";
      }
    }

    function persistAuthentication() {
      localStorage.setItem(AUTH_KEY, "true");
      setAuthenticatedState(true);
      loadPages();
    }

    authForm.addEventListener("submit", (event) => {
      event.preventDefault();
      authError.textContent = "";

      if (passwordInput.value === PASSWORD) {
        persistAuthentication();
        return;
      }

      authError.textContent = "パスワードが違います。";
      passwordInput.select();
    });

    logoutButton.addEventListener("click", () => {
      localStorage.removeItem(AUTH_KEY);
      setAuthenticatedState(false);
      passwordInput.focus();
    });

    if (localStorage.getItem(AUTH_KEY) === "true") {
      setAuthenticatedState(true);
      loadPages();
    } else {
      setAuthenticatedState(false);
    }
  </script>
</body>
</html>
