<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6efe6;
      color: #2d241a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(440px, calc(100% - 32px));
      padding: 28px 24px;
      border-radius: 24px;
      border: 1px solid #d9cbb8;
      background: rgba(255, 252, 247, 0.92);
      box-shadow: 0 24px 60px rgba(74, 47, 22, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1;
    }

    p {
      margin: 0;
      color: #786756;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>このページは利用できません。</p>
  </main>
</body>
</html>
